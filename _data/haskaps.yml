# _data/cultivars/haskaps.yml
# Mori Mountain Entity Schema v0.1.0
# Species-level facts (pH, hardiness) sourced from published research + USask.
# Personal/farm fields (productivity_score, stability_score, vigor_score, your
# own soil/risk observations) are left `unknown` — yours to fill as you grow.

cultivars:

  - id: aurora
    name: Aurora
    type: cultivar
    status: production          # you have 2 growing
    species: haskap

    system_role:
      primary: production
      network_function: >
        Originally bred as a companion pollinator for the Borealis-Tundra-Indigo
        (BTI) series; now grown as a primary production cultivar in its own right.

    performance:
      productivity_score: unknown
      stability_score: unknown
      vigor_score: unknown

    risk:
      frost_sensitivity: unknown
      drought_tolerance: unknown
      disease_susceptibility: unknown
      winter_kill_risk: low        # species-level: hardy below -47C

    environment:
      climate_zone: "USDA 2-8"
      soil_ph:
        optimum:   {min: 5.5, max: 6.5}   # species-level (Wikipedia/peer-reviewed)
        tolerance: {min: 3.9, max: 7.7}   # species-level
        lethal:    {below: unknown, above: unknown}

    soil:
      mycorrhizal_type: unknown
      root_architecture: unknown

    relationships:
      best_pollinators: [tundra, indigo-gem, honey-bee]   # any unrelated cultivar blooming same time
      companion_plants: []
      antagonistic_species: []

    phenology:
      bud_break: unknown
      flowering_time: mid
      fruiting_window: mid            # mid-June to mid-July

    utility:
      edible_value: high
      market_demand: unknown

